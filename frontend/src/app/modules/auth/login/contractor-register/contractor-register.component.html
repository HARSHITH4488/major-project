<div class="register-container">

  <div class="register-card">

    <h2>Contractor Registration</h2>

    <p class="sub-text">
      Register to request access to Site Manager
    </p>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Enter your name"/>
      </div>

      <div class="input-group">
        <label>Phone</label>
        <input type="text" formControlName="phone" placeholder="Enter phone number"/>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter email"/>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Create password"/>
      </div>

      <div class="success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>

    </form>

  </div>

</div>
