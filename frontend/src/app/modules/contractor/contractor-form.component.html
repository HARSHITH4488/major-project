<div class="form-page">

  <div class="form-card">

    <!-- Header -->
    <div class="form-header">
      <div>
        <h1>{{ isEditMode ? 'Edit Contractor' : 'Create Contractor' }}</h1>
        <p class="subtitle">
          Manage contractor details and specialization
        </p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #contractorForm="ngForm">

      <!-- BASIC DETAILS -->
      <div class="section-title">Basic Information</div>
      <!-- Select Registered Contractor -->
<div class="form-group" *ngIf="!isEditMode">
  <label>Select Registered Contractor</label>

  <select
    [(ngModel)]="selectedUserId"
    name="userSelect"
    (change)="onSelectContractor(selectedUserId)"
  >

    <option value="">Select Contractor</option>

    <option
      *ngFor="let user of approvedContractors"
      [value]="user.id"
    >
      {{ user.name }} ({{ user.email }})
    </option>

  </select>

</div>

      <div class="form-grid">
        

        <!-- Name -->
        <div class="form-group">
          <label>Full Name</label>
          <input type="text"
                 name="name"
                 [(ngModel)]="contractor.name"
                 required>
        </div>
        

        <!-- Email -->
        <div class="form-group">
          <label>Email Address</label>
          <input type="email"
                 name="email"
                 [(ngModel)]="contractor.email">
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text"
                 name="phone"
                 [(ngModel)]="contractor.phone">
        </div>

        <!-- Company -->
        <div class="form-group">
          <label>Company Name</label>
          <input type="text"
                 name="companyName"
                 [(ngModel)]="contractor.companyName">
        </div>

      </div>

      <!-- WORK DETAILS -->
      <div class="section-title mt">Work Details</div>

      <div class="form-grid">

        <!-- Nature of Work -->
        <div class="form-group">
          <label>Nature of Work</label>
          <select name="natureOfWork"
                  [(ngModel)]="contractor.natureOfWork">
            <option value="">Select Work Type</option>
            <option *ngFor="let type of workTypes"
                    [value]="type">
              {{ type }}
            </option>
          </select>
        </div>

        <!-- Specialization -->
        <div class="form-group"
             *ngIf="contractor.natureOfWork">
          <label>
            Specialization in {{ contractor.natureOfWork }}
          </label>

          <input type="text"
                 name="specialization"
                 [(ngModel)]="contractor.specialization"
                 placeholder="e.g., Concrete Roofing, Pipeline Installation">
        </div>

      </div>

      <!-- Address -->
      <div class="section-title mt">Address</div>

      <div class="form-group full-width">
        <textarea name="address"
                  rows="3"
                  [(ngModel)]="contractor.address"
                  placeholder="Enter contractor address">
        </textarea>
      </div>

      <!-- Actions -->
      <div class="form-actions">

        <button type="button"
                class="btn-secondary"
                routerLink="/contractors">
          Cancel
        </button>

        <button type="submit"
                class="btn-primary"
                [disabled]="contractorForm.invalid">

          {{ isEditMode ? 'Update Contractor' : 'Create Contractor' }}

        </button>

      </div>

    </form>

  </div>

</div>
