<div class="timeline-card">

  <h3>Project Timeline</h3>

  <div class="timeline">

    <div class="timeline-row" *ngFor="let s of schedules">

      <!-- WORK NAME -->
      <div class="timeline-label">
        {{ s.workName }}
      </div>

      <!-- TIMELINE AREA -->
      <div class="timeline-bar-wrapper">

        <div
          class="timeline-bar"
          [style.width.px]="getScheduleDuration(s)"
          [style.left.px]="getScheduleOffset(s)">

          {{ s.startDate | date:'MMM d' }} → {{ s.endDate | date:'MMM d' }}

        </div>

      </div>

      <!-- ACTION BUTTONS -->
      <div class="timeline-actions">
        <button class="btn-edit" (click)="editSchedule(s); $event.stopPropagation()">Edit</button>
        <button class="btn-delete" (click)="deleteSchedule(s.id); $event.stopPropagation()">Delete</button>
        <button class="btn-primary" (click)="goToTasks(s.id); $event.stopPropagation()">Manage</button>
      </div>

    </div>

  </div>

</div>
<!-- ================= EDIT SCHEDULE PANEL ================= -->

<div *ngIf="editingSchedule" class="edit-panel">

  <h3>Edit Schedule: {{ editingSchedule.workName }}</h3>

  <div class="form-row">
    <label>Start Date</label>
    <input type="date" [(ngModel)]="scheduleForm.startDate">
  </div>

  <div class="form-row">
    <label>End Date</label>
    <input type="date" [(ngModel)]="scheduleForm.endDate">
  </div>

  <div class="form-actions">
    <button class="btn-primary" (click)="updateSchedule()">
      Update
    </button>

    <button class="btn-secondary" (click)="editingSchedule = null">
  Cancel
</button>
  </div>

</div>
