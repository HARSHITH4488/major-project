<div class="module-card">

  <div class="section-header">
    <h3>Create Work Schedule</h3>
  </div>

  <div class="form-card">

    <!-- WORK NAME -->
    <div class="form-row">

      <div>
        <label>Scope of Work</label>

        <input
  type="text"
  [(ngModel)]="scheduleData.workName"
  placeholder="e.g., Bathroom Construction, Electrical Wiring"
/>
      </div>

      <div>
        <label>Reminder (Days Before)</label>

        <input
          type="number"
          min="1"
          [(ngModel)]="scheduleData.reminderDaysBefore"
        />
      </div>

    </div>

    <!-- DATES -->
    <div class="form-row">

      <div>
        <label>Start Date</label>
        <input type="date" [(ngModel)]="scheduleData.startDate" />
      </div>

      <div>
        <label>End Date</label>
        <input type="date" [(ngModel)]="scheduleData.endDate" />
      </div>

    </div>

    <!-- DESCRIPTION -->
    <div class="form-row full">

      <label>Work Description</label>

      <textarea
        rows="2"
        [(ngModel)]="scheduleData.description"
        placeholder="Describe the work task">
      </textarea>

    </div>

    <!-- BUTTON -->
    <div class="form-actions">

      <button
        class="btn-primary"
        (click)="createSchedule()">

        Schedule Work

      </button>

    </div>

  </div>

</div>
