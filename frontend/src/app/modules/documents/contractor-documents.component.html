<div class="container">

  <h2>👷 Contractor Documents</h2>

  <!-- EMPTY STATE -->
  <div *ngIf="documents.length === 0" class="empty">
    No contractor documents found
  </div>

  <!-- TABLE -->
  <table *ngIf="documents.length > 0" class="doc-table">

    <thead>
      <tr>
        <th>File</th>
        <th>Category</th>
        <th>Uploaded By</th>
        <th>Date</th>
        <th>Size</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let doc of documents">

        <!-- FILE -->
        <td class="file-cell">
          📄 {{ doc.fileName }}
        </td>

        <!-- CATEGORY -->
        <td>
          <span class="category">
            {{ doc.category || 'General' }}
          </span>
        </td>

        <!-- UPLOADED BY -->
        <td>
          👷 {{ doc.uploadedByName || 'Contractor' }}
        </td>

        <!-- DATE -->
        <td>
          {{ doc.uploadedAt | date:'mediumDate' }}
        </td>

        <!-- SIZE -->
        <td>
          {{ (doc.fileSize / 1024).toFixed(1) }} KB
        </td>

        <!-- ACTIONS -->
        <td class="actions">

          <!-- VIEW -->
          <button (click)="view(doc)" class="btn view">
            👁 View
          </button>

          <!-- DOWNLOAD -->
          <button (click)="download(doc.id)" class="btn download">
            ⬇ Download
          </button>

          <!-- DELETE -->
          <button (click)="delete(doc)" class="btn delete">
            🗑 Delete
          </button>

        </td>

      </tr>
    </tbody>

  </table>

</div>
