<div class="page-bg">

  

  <!-- FORM CARD -->
  <div class="form-card">
    <h2>Create New Project</h2>
    <p class="subtitle">Fill in project details to get started</p>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">

      <app-toast
        *ngIf="showToast"
        [message]="toastMessage"
        type="success">
      </app-toast>

      <!-- Project Name -->
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" formControlName="projectName" placeholder="Enter project name" />
      </div>

      <!-- Project Type -->
      <div class="form-group">
        <label>Project Type</label>
        <select formControlName="projectType">
          <option value="">Select Type</option>
          <option value="RESIDENTIAL">Residential</option>
          <option value="COMMERCIAL">Commercial</option>
          <option value="INFRASTRUCTURE">Infrastructure</option>
        </select>
      </div>

      <!-- Client -->
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" formControlName="clientName" placeholder="Client name" />
      </div>

      <!-- Dates -->
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" formControlName="startDate" />
        </div>

        <div class="form-group">
          <label>End Date</label>
          <input type="date" formControlName="endDate" />
        </div>
      </div>

      <!-- Amount -->
      <div class="form-group">
        <label>Total Amount (₹)</label>
        <input type="number" formControlName="totalAmount" placeholder="Enter budget" />
      </div>

      <!-- Status -->
      <div class="form-group">
        <label>Status</label>
        <select formControlName="status">
          <option value="ACTIVE">Active</option>
          <option value="COMPLETED">Completed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Project' }}
        </button>

       <button class="btn-secondary" type="button" (click)="goBack()">
  ← Back
</button>
      </div>

    </form>
  </div>

</div>
