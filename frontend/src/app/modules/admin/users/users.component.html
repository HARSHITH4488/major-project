<div class="users-container">

  <h2>Users Management</h2>

  <table *ngIf="users.length">

    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let user of users">

        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>

        <td>
          <span class="status" [class]="user.status.toLowerCase()">
            {{ user.status }}
          </span>
        </td>

        <td class="actions">

          <button
            *ngIf="user.status === 'PENDING'"
            (click)="approve(user.id)">
            Approve
          </button>

          <button
            *ngIf="user.status === 'ACTIVE'"
            (click)="suspend(user.id)">
            Suspend
          </button>

          <button
            class="delete"
            (click)="delete(user.id)">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

  <p *ngIf="!users.length && !loading">No users found</p>

</div>
