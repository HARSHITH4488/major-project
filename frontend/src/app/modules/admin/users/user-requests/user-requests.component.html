<div class="page-container">

  <div class="page-header">
    <h2>Pending User Requests</h2>
    <p>Review and approve new user registrations</p>
  </div>

  <div class="card">

    <table class="data-table">

      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let user of pendingUsers">

          <td>{{user.name}}</td>
          <td>{{user.email}}</td>
          <td>{{user.phone}}</td>

          <td>
            <span class="role-badge">
              {{user.role}}
            </span>
          </td>

          <td class="actions">

            <button
              (click)="approve(user.id)"
              class="btn approve">

              Approve

            </button>

            <button
              (click)="reject(user.id)"
              class="btn reject">

              Reject

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
