<div class="page-wrapper">

  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <h2>Daily Task Management</h2>
      <p>Assign and track employee tasks efficiently</p>
    </div>

    <!-- FORM CARD -->
    <div class="card form-card">

      <div class="form-row">

        <div class="form-group">
          <label>Employee</label>
          <select [(ngModel)]="selectedUserId" (change)="filterTasks()">
            <option value="">Select Employee</option>
            <option *ngFor="let emp of employees" [value]="emp.id">
              {{ emp.name }}
            </option>
          </select>
        </div>
        <div class="form-group">
  <label>Date</label>
  <input type="date" [(ngModel)]="taskDate" />
</div>

        <div class="form-group">
          <label>Task</label>
          <input
            type="text"
            [(ngModel)]="taskTitle"
            placeholder="Enter task..."
          />
        </div>

       <div class="form-group btn-group">
  <button 
    class="primary-btn"
    (click)="assignTask()"
    [disabled]="!selectedUserId || !taskTitle || !taskDate">
    ➕ Assign Task
  </button>
</div>

      </div>

    </div>

    <!-- TABLE CARD -->
    <div class="table-wrapper">
  <table>

        <thead>
          <tr>
            <th>Employee</th>
            <th>Task</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

         <tr *ngFor="let task of filteredTasks" class="table-row">
            <td>{{ task.user?.name || task.employeeName }}</td>

            <td>{{ task.title }}</td>

            <td>{{ task.startDate | date:'mediumDate' }}</td>

            <td>
              <span 
                [ngClass]="task.isCompleted ? 'badge done' : 'badge pending'">
                {{ task.isCompleted ? 'Completed' : 'Pending' }}
              </span>
            </td>

            <td>
              <button class="delete-btn" (click)="deleteTask(task.id)">
                Delete
              </button>
            </td>

          </tr>

          <tr *ngIf="tasks.length === 0">
          <td colspan="5" class="empty">
  📭 No tasks assigned yet
</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
