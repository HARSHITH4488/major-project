<div class="page-wrapper">

  <div class="content chat-layout">

    <!-- LEFT PANEL (FORM) -->
    <div class="left-panel">

      <div class="header">
        <h2>Daily Task</h2>
        <p>Assign tasks like a conversation</p>
      </div>

      <div class="card form-card">

        <div class="form-group">
          <label>Employee</label>
          <select [(ngModel)]="selectedUserId">
            <option value="">Select Employee</option>
            <option *ngFor="let emp of employees" [value]="emp.id">
              {{ emp.name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" [(ngModel)]="taskDate" />
        </div>

        <div class="form-group">
          <label>Task</label>
          <input
            type="text"
            [(ngModel)]="taskTitle"
            placeholder="What needs to be done?"
          />
        </div>

        <button 
          class="primary-btn"
          (click)="assignTask()"
          [disabled]="!selectedUserId || !taskTitle || !taskDate">
          ➕ Assign Task
        </button>

      </div>

    </div>

    <!-- RIGHT PANEL (CHAT TASKS) -->
    <div class="chat-panel">

      <div class="chat-header">
        <h3>Task Activity</h3>
      </div>

      <div class="chat-body">

       <div *ngIf="filteredTasks.length === 0" class="empty-state">
  <span class="material-icons empty-icon">task_alt</span>
  <p>No tasks assigned yet</p>
  <span>Start by assigning a task</span>
</div>

        <div 
          *ngFor="let task of filteredTasks" 
          class="chat-bubble">

          <div class="bubble-header">
            <span class="user">
              {{ task.user?.name || task.employeeName }}
            </span>

            <span class="date">
              {{ task.startDate | date:'mediumDate' }}
            </span>
          </div>

          <div class="bubble-content">
            {{ task.title }}
          </div>

          <div class="bubble-footer">

            <span 
              [ngClass]="task.isCompleted ? 'badge done' : 'badge pending'">
              {{ task.isCompleted ? 'Completed' : 'Pending' }}
            </span>

            <button 
              class="delete-btn" 
              (click)="deleteTask(task.id)">
              Delete
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
